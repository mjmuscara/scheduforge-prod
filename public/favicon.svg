<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1a3fa8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Calendar body with subtle fill -->
  <rect x="5.5" y="8.5" width="21" height="18" rx="2.5"
        fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.88)" stroke-width="1.5"/>

  <!-- Header band -->
  <rect x="5.5" y="8.5" width="21" height="5.5" rx="2.5" fill="rgba(255,255,255,0.18)"/>
  <rect x="5.5" y="11.5" width="21" height="2.5" fill="rgba(255,255,255,0.18)"/>

  <!-- Divider line -->
  <line x1="5.5" y1="14" x2="26.5" y2="14" stroke="rgba(255,255,255,0.88)" stroke-width="1.5"/>

  <!-- Calendar pins -->
  <line x1="11.5" y1="5.5" x2="11.5" y2="10.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="20.5" y1="5.5" x2="20.5" y2="10.5" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Row 1 cells -->
  <rect x="8" y="16.5" width="4" height="3" rx="1" fill="white" opacity="0.85"/>
  <rect x="14" y="16.5" width="4" height="3" rx="1" fill="white" opacity="0.85"/>
  <rect x="20" y="16.5" width="4" height="3" rx="1" fill="white" opacity="0.85"/>

  <!-- Row 2 cells — centre one highlighted as "today" -->
  <rect x="8" y="21" width="4" height="3" rx="1" fill="white" opacity="0.5"/>
  <rect x="14" y="21" width="4" height="3" rx="1" fill="white"/>
  <rect x="20" y="21" width="4" height="3" rx="1" fill="white" opacity="0.5"/>
</svg>
