<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1a5fb4"/>
  <!-- Clock face -->
  <circle cx="16" cy="16" r="10" fill="white" opacity="0.15" stroke="white" stroke-width="1.5"/>
  <!-- Hour hand (pointing to ~10) -->
  <line x1="16" y1="16" x2="11" y2="11" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~12) -->
  <line x1="16" y1="16" x2="16" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="white"/>
</svg>
