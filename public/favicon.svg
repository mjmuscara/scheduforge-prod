<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#ffffff"/>
  <!-- Clock face -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#1a5fb4" stroke-width="2"/>
  <!-- Hour hand (~10) -->
  <line x1="16" y1="16" x2="11" y2="11" stroke="#1a5fb4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand (~12) -->
  <line x1="16" y1="16" x2="16" y2="9" stroke="#1a5fb4" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#1a5fb4"/>
</svg>
